name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Single source of truth: CI runs the SAME `make ci` you run locally
      # (gofmt check + build/vet/test, default and -tags nats), so the two
      # can't drift. Run `make ci` before pushing — or `make hooks` once to
      # have git push run it for you.
      - name: make ci
        run: make ci
